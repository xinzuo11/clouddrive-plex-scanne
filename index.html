<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudDrive - Plex 扫描器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; padding: 20px; color: #e0e0e0; }
        .container { max-width: 1200px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 30px; padding: 30px 0; }
        .header h1 { font-size: 2.2em; color: #e94560; margin-bottom: 8px; }
        .header p { color: #aaa; }
        .card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 25px; margin-bottom: 20px; }
        .card-title { font-size: 1.3em; color: #e94560; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #2a2a4a; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap; }
        .tab { padding: 10px 20px; border: 1px solid #2a2a4a; background: #16213e; color: #aaa; cursor: pointer; border-radius: 8px 8px 0 0; font-size: 0.95em; transition: all 0.3s; }
        .tab:hover { background: #1a1a3e; color: #fff; }
        .tab.active { background: #e94560; color: #fff; border-color: #e94560; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; color: #ccc; font-weight: 500; font-size: 0.9em; }
        .form-group input { width: 100%; padding: 10px 14px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 8px; color: #fff; font-size: 0.95em; }
        .form-group input:focus { outline: none; border-color: #e94560; }
        .hint { font-size: 0.8em; color: #666; margin-top: 4px; }
        .btn { padding: 8px 18px; border: none; border-radius: 8px; font-size: 0.9em; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .btn-primary { background: #e94560; color: #fff; }
        .btn-primary:hover { background: #d63851; }
        .btn-success { background: #0f3460; color: #fff; }
        .btn-success:hover { background: #1a4a7a; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-outline { background: transparent; border: 1px solid #e94560; color: #e94560; }
        .btn-outline:hover { background: #e94560; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 0.82em; }
        .btn-xs { padding: 2px 8px; font-size: 0.75em; }
        .btn-group { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 15px; display: none; }
        .alert-success { background: #0d2818; color: #4ec9b0; border: 1px solid #1a4a2a; }
        .alert-error { background: #2d0a0a; color: #f44747; border: 1px solid #4a1a1a; }
        .alert-info { background: #0a1a2d; color: #569cd6; border: 1px solid #1a2a4a; }
        .mapping-block { background: #16213e; border: 1px solid #2a2a4a; border-radius: 10px; padding: 18px; margin-bottom: 15px; position: relative; }
        .mapping-block-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .mapping-block-header h4 { color: #e94560; font-size: 1em; }
        .lib-id-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid #2a2a4a; }
        .lib-id-row label { color: #888; font-size: 0.85em; white-space: nowrap; }
        .lib-id-row input { width: 80px; padding: 8px 12px; background: #0f1a2e; border: 1px solid #2a2a4a; border-radius: 6px; color: #fff; }
        .path-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; background: #0f1a2e; padding: 10px 12px; border-radius: 6px; }
        .path-row .path-num { min-width: 45px; font-size: 0.82em; color: #e94560; font-weight: 600; }
        .path-row input { flex: 1; padding: 8px 12px; background: #16213e; border: 1px solid #2a2a4a; border-radius: 6px; color: #fff; font-size: 0.9em; }
        .path-row input:focus { outline: none; border-color: #e94560; }
        .path-row .path-col { flex: 1; display: flex; flex-direction: column; }
        .path-row .path-col label { font-size: 0.75em; color: #888; margin-bottom: 3px; }
        .remove-block { position: absolute; top: 14px; right: 14px; cursor: pointer; color: #f44747; font-size: 1.1em; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .remove-block:hover { background: #2d0a0a; }
        .webhook-info { background: #0f1a2e; border: 2px dashed #e94560; border-radius: 10px; padding: 18px; margin-top: 15px; }
        .webhook-url { font-family: 'Courier New', monospace; background: #0a0a1a; padding: 10px 14px; border-radius: 6px; word-break: break-all; user-select: all; color: #4ec9b0; font-size: 0.9em; }
        .logs { background: #0a0a1a; border: 1px solid #2a2a4a; border-radius: 8px; padding: 14px; max-height: 450px; overflow-y: auto; font-family: 'Courier New', monospace; font-size: 0.82em; line-height: 1.7; }
        .log-info { color: #569cd6; } .log-error { color: #f44747; } .log-success { color: #4ec9b0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px 12px; border: 1px solid #2a2a4a; text-align: left; font-size: 0.9em; }
        th { background: #16213e; color: #e94560; } td { color: #ccc; }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.6em; }
            .path-row { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header"><h1>🔄 CloudDrive → Plex 扫描器</h1><p>自动接收CloudDrive2通知，触发Plex局部扫描</p></div>
    <div id="alertBox" class="alert"></div>
    <div class="tabs">
        <button class="tab active" onclick="switchTab('config')">⚙️ Plex配置</button>
        <button class="tab" onclick="switchTab('mappings')">📁 路径映射</button>
        <button class="tab" onclick="switchTab('test')">🧪 测试</button>
        <button class="tab" onclick="switchTab('logs')">📋 日志</button>
    </div>

    <!-- Plex配置 -->
    <div id="config-tab" class="tab-content active">
        <div class="card">
            <div class="card-title">Plex 服务器配置</div>
            <div class="form-group"><label>Plex 服务器地址</label><input type="text" id="plexUrl" placeholder="http://192.168.1.100:32400"></div>
            <div class="form-group"><label>Plex Token</label><input type="text" id="plexToken" placeholder="输入你的Plex Token"></div>
            <div class="form-group"><label>Webhook 安全Token（可选）</label><input type="text" id="webhookToken" placeholder="留空不验证"></div>
            <div class="btn-group">
                <button class="btn btn-primary" onclick="savePlexConfig()">💾 保存配置</button>
                <button class="btn btn-outline" onclick="testPlexConnection()">🔍 测试连接</button>
                <button class="btn btn-outline" onclick="getPlexLibraries()">📚 获取库列表</button>
            </div>
            <div id="plexLibraries" style="margin-top:15px;"></div>
        </div>
        <div class="webhook-info"><h4 style="color:#e94560;margin-bottom:8px;">📡 Webhook 地址</h4><div class="webhook-url" id="webhookUrl"></div><p style="margin-top:8px;color:#888;font-size:0.85em;">填入CloudDrive2的Webhook设置</p></div>
    </div>

    <!-- 路径映射 -->
    <div id="mappings-tab" class="tab-content">
        <div class="card">
            <div class="card-title"><span>路径映射配置</span></div>
            <p style="color:#888;margin-bottom:15px;font-size:0.9em;">每个映射对应一个Plex库，可添加多个路径，每个路径独立对应Plex库路径</p>
            <div id="mappingsList"></div>
            <button class="btn btn-success" onclick="addMapping()" style="margin-top:12px;">➕ 添加映射</button>
            <div class="btn-group"><button class="btn btn-primary" onclick="saveMappings()">💾 保存映射</button></div>
        </div>
    </div>

    <!-- 测试 -->
    <div id="test-tab" class="tab-content">
        <div class="card">
            <div class="card-title">测试扫描</div>
            <div class="form-group"><label>CloudDrive文件路径</label><input type="text" id="testPath" placeholder="/123云盘/影视/tv/test.mkv"></div>
            <button class="btn btn-success" onclick="testScan()">🚀 测试扫描</button>
            <div id="testResult" style="margin-top:15px;"></div>
        </div>
    </div>

    <!-- 日志 -->
    <div id="logs-tab" class="tab-content">
        <div class="card">
            <div class="card-title"><span>系统日志</span><div><button class="btn btn-sm btn-outline" onclick="refreshLogs()">🔄 刷新</button><button class="btn btn-sm btn-danger" onclick="clearLogs()">🗑️ 清空</button></div></div>
            <div class="logs" id="logsContent">加载中...</div>
        </div>
    </div>
</div>

<script>
const host = window.location.hostname;
const port = window.location.port || '5001';
window.onload = function() {
    document.getElementById('webhookUrl').textContent = 'http://' + host + ':' + port + '/webhook/clouddrive';
    loadConfig(); loadMappings(); refreshLogs();
};
function switchTab(name) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    event.target.classList.add('active');
    document.getElementById(name + '-tab').classList.add('active');
    if (name === 'logs') refreshLogs();
}
function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    box.className = 'alert alert-' + type;
    box.textContent = msg; box.style.display = 'block';
    setTimeout(() => box.style.display = 'none', 4000);
}
async function loadConfig() {
    try {
        const r = await fetch('/api/config'); const d = await r.json();
        document.getElementById('plexUrl').value = d.plex_url || '';
        document.getElementById('plexToken').value = d.plex_token || '';
        document.getElementById('webhookToken').value = d.webhook_token || '';
    } catch(e) {}
}
async function savePlexConfig() {
    const c = { plex_url: document.getElementById('plexUrl').value, plex_token: document.getElementById('plexToken').value, webhook_token: document.getElementById('webhookToken').value };
    try {
        const r = await fetch('/api/config', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(c) });
        const d = await r.json();
        showAlert(d.success ? '保存成功！' : '保存失败', d.success ? 'success' : 'error');
    } catch(e) { showAlert('保存失败: ' + e.message, 'error'); }
}
async function testPlexConnection() {
    const url = document.getElementById('plexUrl').value, token = document.getElementById('plexToken').value;
    if (!url || !token) { showAlert('请填写Plex地址和Token', 'error'); return; }
    showAlert('正在测试...', 'info');
    try {
        const r = await fetch('/api/test-plex', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({plex_url: url, plex_token: token}) });
        const d = await r.json();
        if (d.success) { showAlert('连接成功！找到 ' + d.library_count + ' 个库', 'success'); displayLibraries(d.libraries); }
        else showAlert('连接失败: ' + d.error, 'error');
    } catch(e) { showAlert('连接失败', 'error'); }
}
async function getPlexLibraries() {
    try {
        const r = await fetch('/api/libraries'); const d = await r.json();
        if (d.success) { displayLibraries(d.libraries); showAlert('获取成功', 'success'); }
        else showAlert('获取失败', 'error');
    } catch(e) { showAlert('获取失败', 'error'); }
}
function displayLibraries(libs) {
    const c = document.getElementById('plexLibraries');
    if (!libs || libs.length === 0) { c.innerHTML = '<p style="color:#888;">未找到库</p>'; return; }
    let h = '<table><tr><th>库ID</th><th>名称</th><th>类型</th><th>路径</th></tr>';
    libs.forEach(l => h += '<tr><td><strong>' + l.key + '</strong></td><td>' + l.title + '</td><td>' + l.type + '</td><td>' + (l.path || '-') + '</td></tr>');
    h += '</table>'; c.innerHTML = h;
}

// ===== 映射管理 =====
async function loadMappings() {
    try { const r = await fetch('/api/mappings'); const d = await r.json(); renderMappings(d.mappings || {}); } catch(e) {}
}
function renderMappings(mappings) {
    const c = document.getElementById('mappingsList');
    if (Object.keys(mappings).length === 0) { c.innerHTML = '<p style="color:#888;text-align:center;padding:20px;">暂无映射</p>'; return; }
    let h = '';
    for (const [name, m] of Object.entries(mappings)) {
        let paths = m.paths || [];
        if (paths.length === 0) {
            // 兼容旧格式
            const oldCd = m.clouddrive_path || '';
            const oldPlex = m.plex_library_path || '';
            if (oldCd) paths = [{cd_path: oldCd, plex_path: oldPlex}];
        }
        if (paths.length === 0) paths = [{cd_path: '', plex_path: ''}];
        h += '<div class="mapping-block" data-name="' + name + '">';
        h += '<span class="remove-block" onclick="removeMapping(\'' + name + '\')" title="删除">✕</span>';
        h += '<div class="mapping-block-header"><h4>📁 ' + name + '</h4></div>';
        h += '<div class="lib-id-row"><label>Plex库ID:</label><input type="text" class="lib-id" value="' + (m.plex_library_id || '') + '" placeholder="库ID"></div>';
        h += '<div class="paths-container">';
        paths.forEach((p, i) => {
            h += '<div class="path-row">';
            h += '<span class="path-num">#' + (i+1) + '</span>';
            h += '<div class="path-col"><label>CloudDrive路径</label><input type="text" class="cd-path" value="' + (p.cd_path || '').replace(/"/g, '&quot;') + '" placeholder="/123云盘/影视/电影"></div>';
            h += '<div class="path-col"><label>Plex库路径</label><input type="text" class="plex-path" value="' + (p.plex_path || '').replace(/"/g, '&quot;') + '" placeholder="/wangpang/CloudNAS/CloudDrive/123云盘/影视/电影"></div>';
            h += '<button class="btn btn-xs btn-danger" onclick="removePath(this)">✕</button>';
            h += '</div>';
        });
        h += '</div>';
        h += '<button class="btn btn-xs btn-success" onclick="addPath(this)" style="margin-top:5px;">+ 添加路径</button>';
        h += '</div>';
    }
    c.innerHTML = h;
}
function addPath(btn) {
    const block = btn.closest('.mapping-block');
    const container = block.querySelector('.paths-container');
    const idx = container.querySelectorAll('.path-row').length + 1;
    const row = document.createElement('div');
    row.className = 'path-row';
    row.innerHTML = '<span class="path-num">#' + idx + '</span><div class="path-col"><label>CloudDrive路径</label><input type="text" class="cd-path" placeholder="/123云盘/影视/电影"></div><div class="path-col"><label>Plex库路径</label><input type="text" class="plex-path" placeholder="/wangpang/CloudNAS/CloudDrive/123云盘/影视/电影"></div><button class="btn btn-xs btn-danger" onclick="removePath(this)">✕</button>';
    container.appendChild(row);
}
function removePath(btn) {
    const row = btn.closest('.path-row');
    const container = row.parentElement;
    if (container.querySelectorAll('.path-row').length > 1) {
        row.remove();
        container.querySelectorAll('.path-row').forEach((r, i) => r.querySelector('.path-num').textContent = '#' + (i+1));
    }
}
function addMapping() {
    const name = prompt('请输入映射名称（如：华语电影）:');
    if (!name) return;
    const mappings = getCurrentMappings();
    mappings[name] = {plex_library_id: '', paths: [{cd_path: '', plex_path: ''}]};
    renderMappings(mappings);
}
function removeMapping(name) {
    if (!confirm('确定删除 "' + name + '" 吗？')) return;
    const mappings = getCurrentMappings();
    delete mappings[name];
    renderMappings(mappings);
}
function getCurrentMappings() {
    const mappings = {};
    document.querySelectorAll('.mapping-block').forEach(block => {
        const name = block.getAttribute('data-name');
        const libId = block.querySelector('.lib-id') ? block.querySelector('.lib-id').value : '';
        const paths = [];
        block.querySelectorAll('.path-row').forEach(row => {
            const cd = row.querySelector('.cd-path') ? row.querySelector('.cd-path').value.trim() : '';
            const pp = row.querySelector('.plex-path') ? row.querySelector('.plex-path').value.trim() : '';
            if (cd) paths.push({cd_path: cd, plex_path: pp});
        });
        mappings[name] = {plex_library_id: libId, paths: paths};
    });
    return mappings;
}
async function saveMappings() {
    const mappings = getCurrentMappings();
    try {
        const r = await fetch('/api/mappings', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mappings: mappings}) });
        const d = await r.json();
        showAlert(d.success ? '映射保存成功！' : '保存失败', d.success ? 'success' : 'error');
    } catch(e) { showAlert('保存失败', 'error'); }
}
async function testScan() {
    const path = document.getElementById('testPath').value;
    if (!path) { showAlert('请输入路径', 'error'); return; }
    try {
        const r = await fetch('/api/test-scan', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({path: path}) });
        const d = await r.json();
        document.getElementById('testResult').innerHTML = d.success ? '<div class="alert alert-success" style="display:block;">✅ ' + d.message + '</div>' : '<div class="alert alert-error" style="display:block;">❌ ' + d.message + '</div>';
    } catch(e) { document.getElementById('testResult').innerHTML = '<div class="alert alert-error">❌ ' + e.message + '</div>'; }
}
async function refreshLogs() {
    try {
        const r = await fetch('/api/logs'); const d = await r.json();
        const div = document.getElementById('logsContent');
        if (d.logs && d.logs.length > 0) {
            div.innerHTML = d.logs.map(log => {
                let cls = 'log-info';
                if (log.includes('ERROR') || log.includes('失败')) cls = 'log-error';
                if (log.includes('成功')) cls = 'log-success';
                return '<div class="' + cls + '">' + log.replace(/</g, '&lt;') + '</div>';
            }).join('');
        } else div.innerHTML = '<div style="color:#888;">暂无日志</div>';
        div.scrollTop = div.scrollHeight;
    } catch(e) {}
}
async function clearLogs() {
    if (!confirm('确定清空？')) return;
    await fetch('/api/logs/clear', {method: 'POST'});
    document.getElementById('logsContent').innerHTML = '<div style="color:#888;">日志已清空</div>';
}
setInterval(() => { if (document.getElementById('logs-tab').classList.contains('active')) refreshLogs(); }, 30000);
</script>
</body>
</html>
